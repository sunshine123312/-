# ==================================================
# 采集 Flume 配置（hadoop102 / hadoop103）
# Agent 名称: a1
# TailDir Source → Kafka Channel → Kafka Sink
# ==================================================

# 定义 agent 名称
a1.sources = r1
a1.channels = c1
a1.sinks = k1

# ------ Source 配置：TailDir（实时监控日志文件） ------
a1.sources.r1.type = TAILDIR
a1.sources.r1.filegroups = f1
a1.sources.r1.filegroups.f1 = /opt/module/applog/log/app.*.log
a1.sources.r1.positionFile = /opt/module/flume/data/taildir_position.json
a1.sources.r1.batchSize = 500
a1.sources.r1.backoffSleepIncrement = 1000
a1.sources.r1.maxBackoffSleep = 5000
a1.sources.r1.fileHeader = true
a1.sources.r1.channels = c1

# ------ Channel 配置：Kafka Channel（直接写入 Kafka） ------
a1.channels.c1.type = org.apache.flume.channel.kafka.KafkaChannel
a1.channels.c1.kafka.bootstrap.servers = hadoop102:9092,hadoop103:9092,hadoop104:9092
a1.channels.c1.kafka.topic = TOPIC_LOG
a1.channels.c1.parseAsFlumeEvent = false
a1.channels.c1.kafka.consumer.group.id = flume-consumer

# ------ Sink 配置（Kafka Channel 模式无需单独 Sink） ------
# 数据通过 Kafka Channel 直接进入 Kafka Topic
# 此处 Sink 仅为占位，实际不生效
a1.sinks.k1.type = null
a1.sinks.k1.channel = c1
