# ==================================================
# 消费 Flume 配置（hadoop104）
# Agent 名称: a1
# Kafka Source → File Channel → HDFS Sink
# ==================================================

# 定义 agent 名称
a1.sources = r1
a1.channels = c1
a1.sinks = k1

# ------ Source 配置：Kafka Source ------
a1.sources.r1.type = org.apache.flume.source.kafka.KafkaSource
a1.sources.r1.batchSize = 5000
a1.sources.r1.batchDurationMillis = 2000
a1.sources.r1.kafka.bootstrap.servers = hadoop102:9092,hadoop103:9092,hadoop104:9092
a1.sources.r1.kafka.topics = TOPIC_LOG
a1.sources.r1.kafka.consumer.group.id = flume-consume
a1.sources.r1.interceptors = i1
# 时间戳拦截器，用于 HDFS 按时间分区
a1.sources.r1.interceptors.i1.type = timestamp
a1.sources.r1.channels = c1

# ------ Channel 配置：File Channel（可靠性优先） ------
a1.channels.c1.type = file
a1.channels.c1.checkpointDir = /opt/module/flume/checkpoint
a1.channels.c1.dataDirs = /opt/module/flume/data
a1.channels.c1.maxFileSize = 2146435071
a1.channels.c1.capacity = 1000000
a1.channels.c1.transactionCapacity = 10000
a1.channels.c1.keep-alive = 6

# ------ Sink 配置：HDFS Sink ------
a1.sinks.k1.type = hdfs
a1.sinks.k1.hdfs.path = /origin_data/gmall/log/topic_log/%Y-%m-%d
a1.sinks.k1.hdfs.filePrefix = log-
a1.sinks.k1.hdfs.fileSuffix = .log
a1.sinks.k1.hdfs.round = false
a1.sinks.k1.hdfs.rollInterval = 60
a1.sinks.k1.hdfs.rollSize = 134217728
a1.sinks.k1.hdfs.rollCount = 0
a1.sinks.k1.hdfs.batchSize = 10000
a1.sinks.k1.hdfs.useLocalTimeStamp = true
a1.sinks.k1.hdfs.fileType = CompressedStream
a1.sinks.k1.hdfs.codeC = gzip
a1.sinks.k1.hdfs.writeFormat = Text
a1.sinks.k1.hdfs.minBlockReplicas = 1
a1.sinks.k1.channel = c1
